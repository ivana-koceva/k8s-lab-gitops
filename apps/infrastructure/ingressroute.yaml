apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-ingressroute
  namespace: argocd
spec:
  entryPoints:
    - websecure          # Port 443: Traefik's HTTPS entrypoint
  routes:
    - match: Host(`argocd.local`)
      kind: Rule
      services:
        - name: argocd-server
          port: 443
  tls:
    passthrough: true    # Traefik forwards raw TLS to ArgoCD which handles its own certificate
                      