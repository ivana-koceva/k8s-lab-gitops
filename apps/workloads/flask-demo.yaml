apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ivana-koceva/k8s-lab-gitops
    targetRevision: main
    path: charts/baseline
    helm:
      valueFiles:
        - ../../workloads/flask-demo/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: flask-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true