// monitoring/dashboards/flask-demo-red.json
{
  "title": "flask-demo — RED Metrics",
  "uid": "flask-demo-red",
  "tags": ["flask-demo"],
  "timezone": "browser",
  "schemaVersion": 39,
  "version": 1,
  "refresh": "30s",
  "time": { "from": "now-1h", "to": "now" },
  "panels": [
    {
      "id": 1,
      "title": "Request Rate (req/s)",
      "type": "timeseries",
      "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
      "targets": [
        {
          "expr": "sum(rate(flask_http_request_total{namespace=\"flask-demo\"}[5m])) by (method, path)",
          "legendFormat": "{{method}} {{path}}"
        }
      ]
    },
    {
      "id": 2,
      "title": "Error Rate (5xx req/s)",
      "type": "timeseries",
      "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
      "targets": [
        {
          "expr": "sum(rate(flask_http_request_total{namespace=\"flask-demo\", status=~\"5..\"}[5m])) by (path)",
          "legendFormat": "{{path}}"
        }
      ]
    },
    {
      "id": 3,
      "title": "Error Ratio (%)",
      "type": "timeseries",
      "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
      "targets": [
        {
          "expr": "100 * sum(rate(flask_http_request_total{namespace=\"flask-demo\", status=~\"5..\"}[5m])) / sum(rate(flask_http_request_total{namespace=\"flask-demo\"}[5m]))",
          "legendFormat": "error %"
        }
      ],
      "fieldConfig": {
        "defaults": { "unit": "percent" }
      }
    },
    {
      "id": 4,
      "title": "Request Duration (p50 / p95 / p99)",
      "type": "timeseries",
      "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
      "targets": [
        {
          "expr": "histogram_quantile(0.50, sum(rate(flask_http_request_duration_seconds_bucket{namespace=\"flask-demo\"}[5m])) by (le))",
          "legendFormat": "p50"
        },
        {
          "expr": "histogram_quantile(0.95, sum(rate(flask_http_request_duration_seconds_bucket{namespace=\"flask-demo\"}[5m])) by (le))",
          "legendFormat": "p95"
        },
        {
          "expr": "histogram_quantile(0.99, sum(rate(flask_http_request_duration_seconds_bucket{namespace=\"flask-demo\"}[5m])) by (le))",
          "legendFormat": "p99"
        }
      ],
      "fieldConfig": {
        "defaults": { "unit": "s" }
      }
    }
  ]
}